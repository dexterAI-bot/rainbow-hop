<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>קפוץ קשת</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Alef:wght@400;600&display=swap');
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      margin: 0;
      font-family: 'Alef', system-ui, sans-serif;
      background: radial-gradient(circle at top, #ffe27f 0%, #f79cb9 35%, #8bb4ff 100%);
      color: #1f1b33;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0;
    }
    .app-shell {
      width: min(600px, 100%);
      height: 100vh;
      padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
      margin: 0 auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    header h1 {
      margin: 12px 0 4px;
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: 0.04em;
    }
    header p {
      margin: 0;
      font-size: 1rem;
    }
    #stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.05rem;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 10px 20px rgba(31,27,51,0.18);
      gap: 10px;
      flex-wrap: wrap;
    }
    #stats span {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      white-space: nowrap;
    }
    .canvas-wrap{position:relative;flex:1;min-height:320px}
    #playerCanvas {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background: linear-gradient(180deg,#f7f8ff,#dbe6ff 55%,#f3e8ff 100%);
      box-shadow: inset 0 -6px 20px rgba(31,27,51,0.25),0 20px 40px rgba(31,27,51,0.25);
      touch-action: none;
      display: block;
    }
    .overlay{
      position:absolute;inset:0;
      display:none;
      align-items:center;justify-content:center;
      background:rgba(15,12,34,0.55);
      border-radius:28px;
      padding:16px;
    }
    .overlay.show{display:flex}
    .overlay-card{
      width:min(92%,360px);
      background:rgba(255,255,255,0.92);
      border-radius:20px;
      padding:14px;
      box-shadow:0 18px 40px rgba(0,0,0,0.35);
    }
    .overlay-card h2{margin:0 0 6px}
    .overlay-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
    .metric{background:rgba(31,27,51,0.06);border-radius:14px;padding:10px}
    .metric .t{font-size:0.85rem;opacity:0.8}
    .metric .n{font-size:1.4rem;font-weight:700}
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 18px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      background: #1f1b33;
      color: #fff;
      box-shadow: 0 8px 16px rgba(31,27,51,0.4);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }
    button:active {
      transform: scale(0.98);
    }
    #message {
      font-size: 1rem;
      min-height: 1.2em;
    }
    #credits {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>קפוץ קשת</h1>
      <p>הקש על המסך כדי לקפוץ בין פלטפורמות צבעוניות ולתפוס כוכבים נוצצים!</p>
    </header>
    <div id="stats">
      <span id="starCount">כוכבים: 0</span>
      <span id="bestLabel">שיא: 0</span>
      <span id="status">רגע, מוכן?</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="playerCanvas"></canvas>
      <div id="gameOver" class="overlay" role="dialog" aria-modal="true">
        <div class="overlay-card">
          <h2>המשחק נגמר</h2>
          <div class="overlay-metrics">
            <div class="metric"><div class="t">כוכבים</div><div id="finalStars" class="n">0</div></div>
            <div class="metric"><div class="t">שיא</div><div id="finalBest" class="n">0</div></div>
          </div>
          <div class="row" style="justify-content:center">
            <button id="playAgainBtn">שחק שוב</button>
          </div>
          <div style="margin-top:8px;font-size:0.9rem;opacity:0.85">טיפ: גרור על המסך כדי לזוז לצדדים תוך כדי קפיצה.</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="startBtn">התחל</button>
      <button id="resetBtn">אפס</button>
      <button id="muteBtn">הסר קול</button>
    </div>
    <div id="message">הקש להתחיל והרוץ עם קשת בצבעים!</div>
    <div id="credits">משחק קטן לילדים — צבעים, קפיצות וכוכבים ✨</div>
  </div>
  <script>
    const canvas = document.getElementById('playerCanvas');
    const ctx = canvas.getContext('2d');
    const starCountEl = document.getElementById('starCount');
    const bestLabelEl = document.getElementById('bestLabel');
    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const muteBtn = document.getElementById('muteBtn');
    const overlayEl = document.getElementById('gameOver');
    const finalStarsEl = document.getElementById('finalStars');
    const finalBestEl = document.getElementById('finalBest');
    const playAgainBtn = document.getElementById('playAgainBtn');

    let width = 0;
    let height = 0;
    let gameState = 'idle'; // idle | running | gameover
    let stars = 0;
    let best = Number(localStorage.getItem('rainbowhop-best') || '0');
    let messageAtRest = 'הקש קפיצה קטנה כדי להתחיל!';
    let muted = false;
    let animationId;

    bestLabelEl.textContent = 'שיא: ' + best;

    const gravity = 0.60;
    const jumpPow = 12.5;
    const scrollSpeed = 1.05;
    const platforms = [];
    const platformColors = ['#fbd72a', '#ff9f99', '#b7ffb8', '#ffc7ff', '#8bc9ff'];
    const hero = {
      radius: 26,
      x: 0,
      xTarget: 0,
      y: 0,
      vy: 0,
      vx: 0,
      onPlatform: true,
      currentPlatformId: null,
    };
    let lastPlatformId = 0;

    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state !== 'running') {
        // iOS requires this to be called from a user gesture.
        audioCtx.resume().catch(() => {});
      }
    }

    function playTone(freq, duration = 0.12, type = 'sine') {
      if (muted) return;
      ensureAudio();
      if (!audioCtx || audioCtx.state !== 'running') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function resizeCanvas() {
      width = canvas.clientWidth;

      // Compute available height so the page never scrolls on mobile.
      const shell = document.querySelector('.app-shell');
      const header = shell.querySelector('header');
      const stats = document.getElementById('stats');
      const controls = shell.querySelector('.controls');
      const message = document.getElementById('message');
      const credits = document.getElementById('credits');

      const fixed =
        header.offsetHeight +
        stats.offsetHeight +
        controls.offsetHeight +
        message.offsetHeight +
        credits.offsetHeight +
        64; // gaps/padding

      const available = Math.max(320, window.innerHeight - fixed);
      height = available;

      canvas.style.height = `${height}px`;
      canvas.width = Math.floor(width * devicePixelRatio);
      canvas.height = Math.floor(height * devicePixelRatio);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(devicePixelRatio, devicePixelRatio);

      hero.x = width / 2;
      hero.xTarget = hero.x;
      if (gameState !== 'running') hero.y = height * 0.75;
    }

    function createPlatform(y) {
      const w = 90 + Math.random() * 120;
      const x = Math.random() * (width - w - 20) + 10;
      return { x, y, w, h: 14, color: platformColors[Math.floor(Math.random() * platformColors.length)], id: ++lastPlatformId };
    }

    function refillPlatforms() {
      platforms.length = 0;
      const spacing = 112;

      // Ensure the first platform is always reachable at start.
      const startY = height * 0.82;
      const base = createPlatform(startY);
      base.x = Math.max(10, Math.min(width - base.w - 10, hero.x - base.w / 2));
      platforms.push(base);

      for (let i = 1; i < 10; i++) {
        platforms.push(createPlatform(startY - i * spacing));
      }
    }

    function showGameOver() {
      overlayEl.classList.add('show');
      overlayEl.setAttribute('aria-hidden', 'false');
      finalStarsEl.textContent = String(stars);
      finalBestEl.textContent = String(best);
    }

    function hideGameOver() {
      overlayEl.classList.remove('show');
      overlayEl.setAttribute('aria-hidden', 'true');
    }

    function resetGame() {
      cancelAnimationFrame(animationId);
      gameState = 'idle';
      stars = 0;
      hero.vy = 0;
      hero.vx = 0;
      hero.onPlatform = true;
      hero.currentPlatformId = null;
      hero.y = height * 0.75;
      starCountEl.textContent = 'כוכבים: 0';
      statusEl.textContent = 'מוכן לשמיים?';
      messageEl.textContent = messageAtRest;
      hideGameOver();
      refillPlatforms();
      draw();
    }

    function startGame() {
      if (gameState === 'running') return;
      gameState = 'running';
      stars = 0;
      hero.vy = 0;
      hero.vx = 0;
      hero.onPlatform = true;
      hero.currentPlatformId = null;
      hero.y = height * 0.75;
      starCountEl.textContent = 'כוכבים: 0';
      statusEl.textContent = 'רצים עם הקשת!';
      messageEl.textContent = 'טאפ = קפיצה · גרור = זוז';
      hideGameOver();
      refillPlatforms();

      // Snap hero onto the starting platform.
      const startPlat = platforms[0];
      hero.y = startPlat.y - hero.radius;
      hero.onPlatform = true;
      hero.currentPlatformId = startPlat.id;

      loop();
    }

    function update() {
      if (gameState !== 'running') return;

      // Horizontal movement (supports diagonal jumps): use a velocity that tracks xTarget.
      const dx = hero.xTarget - hero.x;
      hero.vx += dx * 0.02;
      hero.vx *= 0.86;
      hero.vx = Math.max(-8, Math.min(8, hero.vx));
      hero.x += hero.vx;
      hero.x = Math.max(hero.radius, Math.min(width - hero.radius, hero.x));

      // Keep platform lock if we're still standing on the same one.
      if (hero.onPlatform && hero.currentPlatformId) {
        const p = platforms.find(pp => pp.id === hero.currentPlatformId);
        if (p) {
          const contactY = hero.y + hero.radius;
          const withinX = hero.x >= p.x - hero.radius && hero.x <= p.x + p.w + hero.radius;
          const closeY = Math.abs(contactY - p.y) <= 6;
          if (withinX && closeY) {
            hero.y = p.y - hero.radius;
            hero.vy = 0;
          } else {
            hero.onPlatform = false;
            hero.currentPlatformId = null;
          }
        } else {
          hero.onPlatform = false;
          hero.currentPlatformId = null;
        }
      }

      hero.vy += gravity;
      hero.y += hero.vy;

      platforms.forEach(plat => {
        plat.y += scrollSpeed;
      });

      if (hero.y + hero.radius > height) {
        gameState = 'gameover';
        messageEl.textContent = 'אופס, נפל!';
        statusEl.textContent = 'המשחק נגמר';
        playTone(180, 0.35, 'triangle');

        best = Math.max(best, stars);
        localStorage.setItem('rainbowhop-best', String(best));
        bestLabelEl.textContent = 'שיא: ' + best;

        showGameOver();
        return;
      }

      // Land on the first platform we intersect while falling.
      if (hero.vy >= 0 && !hero.onPlatform) {
        const contactY = hero.y + hero.radius;
        for (const plat of platforms) {
          const withinX = hero.x >= plat.x - hero.radius && hero.x <= plat.x + plat.w + hero.radius;
          const crossedTop = contactY >= plat.y && contactY <= plat.y + hero.vy + 8;
          if (withinX && crossedTop) {
            hero.y = plat.y - hero.radius;
            hero.vy = 0;
            hero.onPlatform = true;
            hero.currentPlatformId = plat.id;
            stars += 1;
            starCountEl.textContent = 'כוכבים: ' + stars;
            messageEl.textContent = 'איזה קפיצה יפה! כוכב חדש!';
            playTone(540, 0.14, 'triangle');
            break;
          }
        }
      }

      // Recycle the bottom platform once it leaves the screen.
      if (platforms.length && platforms[0].y > height) {
        platforms.shift();
        const topY = Math.min(...platforms.map(p => p.y));
        platforms.push(createPlatform(topY - 132));
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
      ctx.strokeStyle = 'rgba(31,27,51,0.12)';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 8]);
      for (let y = 0; y < height; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      platforms.forEach(plat => {
        ctx.fillStyle = plat.color;
        ctx.shadowColor = plat.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(plat.x, plat.y);
        ctx.lineTo(plat.x + plat.w, plat.y);
        ctx.lineTo(plat.x + plat.w + 12, plat.y + plat.h);
        ctx.lineTo(plat.x - 12, plat.y + plat.h);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
      });
      ctx.fillStyle = '#fffbf3';
      ctx.beginPath();
      ctx.shadowColor = '#fbe1ff';
      ctx.shadowBlur = 20;
      ctx.arc(hero.x, hero.y, hero.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f1b33';
      ctx.font = 'bold 24px Alef, system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🎀', hero.x, hero.y);
      ctx.shadowBlur = 0;
    }

    function loop() {
      update();
      draw();
      if (gameState === 'running') animationId = requestAnimationFrame(loop);
    }

    function hop() {
      if (gameState === 'gameover') {
        // don’t auto-restart on tap; use the Game Over button.
        return;
      }
      if (gameState !== 'running') {
        startGame();
        // first tap should also jump
        hero.vy = -jumpPow;
        hero.onPlatform = false;
        hero.currentPlatformId = null;
        playTone(420, 0.14, 'sine');
        messageEl.textContent = 'קפיצה!';
        return;
      }
      if (!hero.onPlatform) return;
      hero.vy = -jumpPow;
      hero.onPlatform = false;
      hero.currentPlatformId = null;
      playTone(420, 0.14, 'sine');
      messageEl.textContent = 'קפיצה!';
    }

    function setTargetFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX ?? rect.left + rect.width / 2) - rect.left;
      hero.xTarget = Math.max(hero.radius, Math.min(width - hero.radius, x));
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      ensureAudio();
      setTargetFromEvent(e);
      hop();
    }, { passive: false });

    canvas.addEventListener('pointermove', (e) => {
      if (gameState !== 'running') return;
      if (e.buttons === 0 && e.pointerType === 'mouse') return;
      setTargetFromEvent(e);
    });

    startBtn.addEventListener('click', () => {
      ensureAudio();
      startGame();
    });
    playAgainBtn.addEventListener('click', () => {
      ensureAudio();
      resetGame();
      startGame();
    });
    resetBtn.addEventListener('click', () => {
      resetGame();
    });
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.textContent = muted ? 'הפעל קול' : 'הסר קול';
      if (!muted) ensureAudio();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') hero.xTarget -= 30;
      if (e.code === 'ArrowRight') hero.xTarget += 30;
      if (e.code === 'Space') {
        e.preventDefault();
        hop();
      }
      hero.xTarget = Math.max(hero.radius, Math.min(width - hero.radius, hero.xTarget));
    });

    // Prevent page scroll from touch moves while playing.
    document.addEventListener('touchmove', (e) => {
      if (gameState === 'running') e.preventDefault();
    }, { passive: false });

    window.addEventListener('resize', () => {
      resizeCanvas();
      draw();
    });

    resizeCanvas();
    refillPlatforms();
    draw();
  </script>
</body>
</html>
