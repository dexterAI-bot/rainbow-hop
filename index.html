<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>קפוץ קשת</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Alef:wght@400;600&display=swap');
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      margin: 0;
      font-family: 'Alef', system-ui, sans-serif;
      background: radial-gradient(circle at top, #ffe27f 0%, #f79cb9 35%, #8bb4ff 100%);
      color: #1f1b33;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0;
    }
    .app-shell {
      width: min(600px, 100%);
      height: 100vh;
      padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
      margin: 0 auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    header h1 {
      margin: 12px 0 4px;
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: 0.04em;
    }
    header p {
      margin: 0;
      font-size: 1rem;
    }
    #stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 10px 20px rgba(31,27,51,0.18);
    }
    #stats span {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    #playerCanvas {
      width: 100%;
      border-radius: 28px;
      background: linear-gradient(180deg,#f7f8ff,#dbe6ff 55%,#f3e8ff 100%);
      box-shadow: inset 0 -6px 20px rgba(31,27,51,0.25),0 20px 40px rgba(31,27,51,0.25);
      touch-action: none;
      display: block;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 18px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      background: #1f1b33;
      color: #fff;
      box-shadow: 0 8px 16px rgba(31,27,51,0.4);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }
    button:active {
      transform: scale(0.98);
    }
    #message {
      font-size: 1rem;
      min-height: 1.2em;
    }
    #credits {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>קפוץ קשת</h1>
      <p>הקש על המסך כדי לקפוץ בין פלטפורמות צבעוניות ולתפוס כוכבים נוצצים!</p>
    </header>
    <div id="stats">
      <span id="starCount">כוכבים: 0</span>
      <span id="status">רגע, מוכן?</span>
    </div>
    <canvas id="playerCanvas"></canvas>
    <div class="controls">
      <button id="startBtn">התחל</button>
      <button id="resetBtn">אפס</button>
      <button id="muteBtn">הסר קול</button>
    </div>
    <div id="message">הקש להתחיל והרוץ עם קשת בצבעים!</div>
    <div id="credits">משחק קטן לילדים, נבנה בלילה כדי שסבתא תוכל לראות בבוקר</div>
  </div>
  <script>
    const canvas = document.getElementById('playerCanvas');
    const ctx = canvas.getContext('2d');
    const starCountEl = document.getElementById('starCount');
    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const muteBtn = document.getElementById('muteBtn');

    let width = 0;
    let height = 0;
    let running = false;
    let stars = 0;
    let messageAtRest = 'הקש קפיצה קטנה כדי להתחיל!';
    let muted = false;
    let animationId;

    const gravity = 0.36;
    const jumpPow = 23;
    const scrollSpeed = 0.95;
    const platforms = [];
    const platformColors = ['#fbd72a', '#ff9f99', '#b7ffb8', '#ffc7ff', '#8bc9ff'];
    const hero = {
      radius: 26,
      x: 0,
      xTarget: 0,
      y: 0,
      vy: 0,
      onPlatform: true
    };
    let lastPlatformId = 0;

    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state !== 'running') {
        // iOS requires this to be called from a user gesture.
        audioCtx.resume().catch(() => {});
      }
    }

    function playTone(freq, duration = 0.12, type = 'sine') {
      if (muted) return;
      ensureAudio();
      if (!audioCtx || audioCtx.state !== 'running') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function resizeCanvas() {
      width = canvas.clientWidth;

      // Compute available height so the page never scrolls on mobile.
      const shell = document.querySelector('.app-shell');
      const header = shell.querySelector('header');
      const stats = document.getElementById('stats');
      const controls = shell.querySelector('.controls');
      const message = document.getElementById('message');
      const credits = document.getElementById('credits');

      const fixed =
        header.offsetHeight +
        stats.offsetHeight +
        controls.offsetHeight +
        message.offsetHeight +
        credits.offsetHeight +
        64; // gaps/padding

      const available = Math.max(320, window.innerHeight - fixed);
      height = available;

      canvas.style.height = `${height}px`;
      canvas.width = Math.floor(width * devicePixelRatio);
      canvas.height = Math.floor(height * devicePixelRatio);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(devicePixelRatio, devicePixelRatio);

      hero.x = width / 2;
      hero.xTarget = hero.x;
      if (!running) hero.y = height * 0.75;
    }

    function createPlatform(y) {
      const w = 90 + Math.random() * 120;
      const x = Math.random() * (width - w - 20) + 10;
      return { x, y, w, h: 14, color: platformColors[Math.floor(Math.random() * platformColors.length)], id: ++lastPlatformId };
    }

    function refillPlatforms() {
      platforms.length = 0;
      const spacing = 84;

      // Ensure the first platform is always reachable at start.
      const startY = height * 0.82;
      const base = createPlatform(startY);
      base.x = Math.max(10, Math.min(width - base.w - 10, hero.x - base.w / 2));
      platforms.push(base);

      for (let i = 1; i < 10; i++) {
        platforms.push(createPlatform(startY - i * spacing));
      }
    }

    function resetGame() {
      cancelAnimationFrame(animationId);
      running = false;
      stars = 0;
      hero.vy = 0;
      hero.onPlatform = true;
      hero.y = height * 0.75;
      starCountEl.textContent = 'כוכבים: 0';
      statusEl.textContent = 'מוכן לשמיים?';
      messageEl.textContent = messageAtRest;
      refillPlatforms();
      draw();
    }

    function startGame() {
      if (running) return;
      running = true;
      stars = 0;
      hero.vy = 0;
      hero.onPlatform = true;
      hero.y = height * 0.75;
      starCountEl.textContent = 'כוכבים: 0';
      statusEl.textContent = 'רצים עם הקשת!';
      messageEl.textContent = 'הקש כדי לקפוץ!';
      refillPlatforms();

      // Snap hero onto the starting platform.
      const startPlat = platforms[0];
      hero.y = startPlat.y - hero.radius;
      hero.onPlatform = true;

      loop();
    }

    function update() {
      if (!running) return;

      // Move sideways smoothly toward target.
      hero.x += (hero.xTarget - hero.x) * 0.25;
      hero.x = Math.max(hero.radius, Math.min(width - hero.radius, hero.x));

      // Assume airborne unless we snap onto a platform this frame.
      hero.onPlatform = false;

      hero.vy += gravity;
      hero.y += hero.vy;

      platforms.forEach(plat => {
        plat.y += scrollSpeed;
      });

      if (hero.y + hero.radius > height) {
        running = false;
        messageEl.textContent = 'אופס, נפל! הקש כדי להתחיל מחדש.';
        statusEl.textContent = 'המשחק נגמר';
        playTone(180, 0.35, 'triangle');
        return;
      }

      // Land on the first platform we intersect while falling.
      if (hero.vy >= 0) {
        const contactY = hero.y + hero.radius;
        for (const plat of platforms) {
          const withinX = hero.x >= plat.x - hero.radius && hero.x <= plat.x + plat.w + hero.radius;
          const crossedTop = contactY >= plat.y && contactY <= plat.y + hero.vy + 6;
          if (withinX && crossedTop) {
            hero.y = plat.y - hero.radius;
            hero.vy = 0;
            hero.onPlatform = true;
            stars += 1;
            starCountEl.textContent = 'כוכבים: ' + stars;
            messageEl.textContent = 'איזה קפיצה יפה! כוכב חדש!';
            playTone(540, 0.14, 'triangle');
            break;
          }
        }
      }

      // Recycle the bottom platform once it leaves the screen.
      if (platforms.length && platforms[0].y > height) {
        platforms.shift();
        const topY = Math.min(...platforms.map(p => p.y));
        platforms.push(createPlatform(topY - 100));
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
      ctx.strokeStyle = 'rgba(31,27,51,0.12)';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 8]);
      for (let y = 0; y < height; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      platforms.forEach(plat => {
        ctx.fillStyle = plat.color;
        ctx.shadowColor = plat.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(plat.x, plat.y);
        ctx.lineTo(plat.x + plat.w, plat.y);
        ctx.lineTo(plat.x + plat.w + 12, plat.y + plat.h);
        ctx.lineTo(plat.x - 12, plat.y + plat.h);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
      });
      ctx.fillStyle = '#fffbf3';
      ctx.beginPath();
      ctx.shadowColor = '#fbe1ff';
      ctx.shadowBlur = 20;
      ctx.arc(hero.x, hero.y, hero.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f1b33';
      ctx.font = 'bold 24px Alef, system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🎀', hero.x, hero.y);
      ctx.shadowBlur = 0;
    }

    function loop() {
      update();
      draw();
      if (running) animationId = requestAnimationFrame(loop);
    }

    function hop() {
      if (!running) {
        startGame();
        // first tap should also jump
        hero.vy = -jumpPow;
        hero.onPlatform = false;
        playTone(420, 0.14, 'sine');
        messageEl.textContent = 'קפיצה!';
        return;
      }
      if (!hero.onPlatform) return;
      hero.vy = -jumpPow;
      hero.onPlatform = false;
      playTone(420, 0.14, 'sine');
      messageEl.textContent = 'קפיצה!';
    }

    function setTargetFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX ?? rect.left + rect.width / 2) - rect.left;
      hero.xTarget = Math.max(hero.radius, Math.min(width - hero.radius, x));
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      ensureAudio();
      setTargetFromEvent(e);
      hop();
    }, { passive: false });

    canvas.addEventListener('pointermove', (e) => {
      if (!running) return;
      if (e.buttons === 0 && e.pointerType === 'mouse') return;
      setTargetFromEvent(e);
    });

    startBtn.addEventListener('click', () => {
      ensureAudio();
      startGame();
    });
    resetBtn.addEventListener('click', () => {
      resetGame();
    });
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.textContent = muted ? 'הפעל קול' : 'הסר קול';
      if (!muted) ensureAudio();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') hero.xTarget -= 30;
      if (e.code === 'ArrowRight') hero.xTarget += 30;
      if (e.code === 'Space') {
        e.preventDefault();
        hop();
      }
      hero.xTarget = Math.max(hero.radius, Math.min(width - hero.radius, hero.xTarget));
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
      draw();
    });

    resizeCanvas();
    refillPlatforms();
    draw();
  </script>
</body>
</html>
